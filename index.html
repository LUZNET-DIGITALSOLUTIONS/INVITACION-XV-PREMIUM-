<!DOCTYPE html>
<html lang="es">
<head>
  <title>INVITACION DIGITAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
  
  
  
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Montserrat&family=Lobster&family=Pacifico&family=Shadows+Into+Light&family=Dancing+Script&family=Raleway&family=Oswald&family=Playfair+Display&family=Indie+Flower&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: black;
    }

    .padre {
      font-family: 'Dancing Script', cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .hijo {
    border: 1px solid pink;
      box-shadow: 0 0 1px deeppink, 0 0 1px deeppink, 0 0 45px deeppink;
    /*  border: 1px solid #FFD700;
      box-shadow: 
        0 0 12px rgba(255, 215, 0, 0.7),
        0 0 24px rgba(255, 215, 0, 0.5),
        0 0 36px rgba(255, 215, 0, 0.3);*/
      width: 90%;
      max-width: 400px;
      height: 600px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      background-image: url("https://i.ibb.co/84QFW5M2/xv-a-os.jpg");
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 2s ease;
      text-align: center;
    }

    .hijo.visible {
      opacity: 1;
      font-family: 'Shadows Into Light';
    }

    /* Animación de cambio de color */
 /*  @keyframes colorShift {
  0%,100% { color:pink; }
  25% { color:white; }
  50% { color:pink; }
  75% { color:pink; }
}*/
a{
    color:black;
}

    #matrix-text {
      font-size: 2.7em;
      white-space: pre;
      animation: colorShift 5s infinite alternate;
      font-family: 'Dancing Script';
    }

    /* Animación Matrix para cada letra */
    #matrix-text span {
      opacity: 0;
      transform: translateY(-400px);
      display: inline-block;
      animation: caer 3s forwards;
    }

    @keyframes caer {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .space {
      display: inline-block;
      width: 0.5em; /* espacio visible */
    }

    /* Animaciones para los demás elementos */
    #slide-p {
    font-size: 1.5em;
      opacity: 0;
      transform: translateX(-100px);
      font-family: Times New Roman;
    }
    #slide-p.visible {
      animation: slideRight 5s forwards, colorShift 5s infinite alternate;
    }
    @keyframes slideRight {
      to { opacity: 1; transform: translateX(0); }
    }

    #link1 {
    font-size: 1.5em;
      opacity: 0;
      transform: translateY(-400px);
      text-decoration: none;
      font-family: Times New Roman;
      
      border: 1px solid pink;
  border-radius: 40px;
  padding: 15px;
  width: 180px;
  background-color: transparent;
  
border: 1px solid pink;
      box-shadow: 0 0 1px deeppink, 0 0 1px deeppink, 0 0 45px deeppink;
/*  box-shadow: 
    0 0 12px rgba(255, 215, 0, 0.7),
    0 0 24px rgba(255, 215, 0, 0.5),
    0 0 36px rgba(255, 215, 0, 0.3);*/
  text-align: center;
  margin:10px;
    }
    #link1.visible {
      animation: downLink 5s forwards, colorShift 5s infinite alternate;
    }
    @keyframes downLink {
      to { opacity: 1; transform: translateY(0); }
    }

    #link2 {
      opacity: 0;
      transform: rotate(-180deg);
      font-family: Times New Roman;
      border: 1px solid pink;
  border-radius: 40px;
  padding: 15px;
  width: 180px;
  background-color: transparent;
  border: 1px solid pink;
      box-shadow: 0 0 1px deeppink, 0 0 1px deeppink, 0 0 45px deeppink;
/*  box-shadow: 
    0 0 12px rgba(255, 215, 0, 0.7),
    0 0 24px rgba(255, 215, 0, 0.5),
    0 0 36px rgba(255, 215, 0, 0.3);*/
  text-align: center;
  margin:10px;
    }
    #link2.visible {
      animation: rotateLink 5s forwards, colorShift 5s infinite alternate;
      text-decoration: none;
      font-size: 1.5em;
    }
    @keyframes rotateLink {
      to { opacity: 1; transform: rotate(0); }
    }

    #link3 {
    font-family: Times New Roman;
      opacity: 0;
      transform: scale(0.2);
      text-decoration: none;
      font-size: 1.5em;
      border: 1px solid pink;
  border-radius: 40px;
  padding: 15px;
  width: 180px;
  background-color: transparent;
  border: 1px solid pink;
      box-shadow: 0 0 1px deeppink, 0 0 1px deeppink, 0 0 45px deeppink;
/*  box-shadow: 
    0 0 12px rgba(255, 215, 0, 0.7),
    0 0 24px rgba(255, 215, 0, 0.5),
    0 0 36px rgba(255, 215, 0, 0.3);*/
  text-align: center;
  margin:10px;
    }
    #link3.visible {
      animation: zoomLink 5s forwards ease-out,colorShift 5s infinite alternate;
    }
    @keyframes zoomLink {
      to { opacity: 1; transform: scale(1); }
    }
   
  </style>
</head>
<body>
  <div class="padre">
    <div class="hijo">
      <!-- data-text contiene la frase final -->
      <h1 id="matrix-text" data-text="Lista de invitados"></h1>
       
      <p id="slide-p">En este apartado van  enlances <br /> a las invitaciones con QR
          
      </p>
      <a id="link1" href="sobre 1.html">Invitado 1</a>
      <a id="link2" href="sobre 2.html">Invitado 2</a>
      <a id="link3" href="sobre 3.html">Invitado 3</a>
    </div>
  </div>

  <script>
    // Función para preparar el efecto Matrix
    function prepararMatrixTexto() {
      const p = document.getElementById('matrix-text');
      if (!p) return;

      const texto = p.getAttribute('data-text');
      p.textContent = ''; // limpiar contenido

      // Crear un orden aleatorio para las letras
      const indices = [...texto.split('').keys()];
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }

      texto.split('').forEach((letra, i) => {
        const span = document.createElement('span');
        if (letra === ' ') {
          span.className = 'space';
        } else {
          span.textContent = letra;
          const delay = indices[i] * 0.2; // retraso aleatorio
          span.style.animationDelay = delay + 's';
        }
        p.appendChild(span);
      });
    }

    // Observer para activar el efecto cuando aparece en pantalla
    const hijo = document.querySelector('.hijo');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          hijo.classList.add('visible');
          prepararMatrixTexto(); // activar efecto Matrix

          // Activar animaciones de los demás elementos
          ['slide-p','link1','link2','link3'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
              el.classList.remove('visible');
              void el.offsetWidth;
              el.classList.add('visible');
            }
          });
        }
      });
    }, { threshold: 0.5 });

    if (hijo) {
      observer.observe(hijo);
    }
  </script>
</body>
</html>
